- defaults:
    link:
      create: true # fehlende Zielverzeichnisse anlegen
      relink: true # eigene, bereits vorhandene Links ersetzen
      force: false # niemals reale Dateien/Verzeichnisse ueberschreiben

- clean:
    "~":
      force: true
    "~/.config":
      recursive: true
    "~/.local/bin": {}
    "~/.claude": {}

- link:
    ~/.config/alacritty: config/alacritty
    ~/.config/hypr: config/hypr
    ~/.config/nvim: config/nvim
    ~/.config/rofi: config/rofi
    ~/.config/mako: config/mako
    ~/.config/mpv: config/mpv
    ~/.config/git: config/git
    ~/.config/typst: config/typst
    ~/.config/keepassxc: config/keepassxc

    ~/.local/bin: config/usrbin

    ~/.bashrc: config/bash/.bashrc
    ~/.bash_profile: config/bash/.bash_profile

    ~/.config/btop/btop.conf: config/btop/btop.conf
    ~/.config/qt5ct/qt5ct.conf: config/qt5ct/qt5ct.conf
    ~/.config/mimeapps.list: config/mimeapps/mimeapps.list
    ~/.config/pipewire/pipewire-pulse.conf.d/99-custom.conf: config/pipewire/99-custom.conf
    ~/.claude/skills: config/claude/skills
    ~/.claude/settings.json: config/claude/settings.json

    ~/.config/systemd/user/battery-check.service: config/systemd-user/battery-check.service
    ~/.config/systemd/user/battery-check.timer: config/systemd-user/battery-check.timer
    ~/.config/systemd/user/dotfiles-sync.service: config/systemd-user/dotfiles-sync.service

- shell:
    - command: systemctl --user daemon-reload
      description: systemd-User-Units (re)aktivieren
      stderr: true
    - command: systemctl --user enable battery-check.timer
      description: systemd-User-Units (re)aktivieren
      stderr: true
    - command: systemctl --user enable dotfiles-sync.service
      description: systemd-User-Units (re)aktivieren
      stderr: true
