#? Config file for btop v.1.4.7
#? Nur die bewusst von den Defaults abweichenden Keys — alle uebrigen Optionen
#? nutzen die btop-Standardwerte. save_config_on_exit=false, damit btop diese
#? (per Stow ins Repo verlinkte) Datei beim Beenden nicht wieder auf den vollen
#? Default-Dump aufblaeht; gepflegt wird deklarativ ueber das Dotfiles-Repo.

# Prozess-Sortierung: direkter CPU-Wert statt "lazy"-Glaettung.
proc_sorting = "cpu direct"

# Netzwerk-Graphen von Down-/Upload nicht synchron skalieren.
net_sync = false

# Nur real vorhandene GPU-Hersteller (kein Apple).
shown_gpus = "nvidia amd intel"

# Config nicht bei jedem Beenden zurueckschreiben (siehe Kopf).
save_config_on_exit = false
