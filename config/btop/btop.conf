#? Config file for btop v.1.4.7
#? Only the keys that deliberately differ from the defaults - all other options
#? use btop's defaults. save_config_on_exit=false so btop does not, on exit,
#? bloat this file (linked into the repo) back into the full default dump; it is
#? maintained declaratively via the dotfiles repo.

# Process sorting: direct CPU value instead of "lazy" smoothing.
proc_sorting = "cpu direct"

# Do not scale the network down/upload graphs in sync.
net_sync = false

# Only GPU vendors that actually exist (no Apple).
shown_gpus = "nvidia amd intel"

# Do not write the config back on every exit (see the header).
save_config_on_exit = false
