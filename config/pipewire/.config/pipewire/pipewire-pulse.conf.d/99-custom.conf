context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 ]
    default.clock.quantum       = 1024
    # min-quantum als vernuenftige Untergrenze: 128 Samples @48 kHz ~ 2,7 ms.
    # Frueher 32 (~0,67 ms) — unnoetig niedrig ohne Pro-Audio-Workload und
    # anfaellig fuer Xruns/CPU-Last; 128 ist responsiv genug fuer Desktop/Games.
    default.clock.min-quantum   = 128
    default.clock.max-quantum   = 2048
    resample.quality            = 10
}

