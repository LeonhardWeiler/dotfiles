context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 96000 ]
    default.clock.quantum       = 1024
    # min-quantum as a sensible lower bound: 128 samples @48 kHz ~ 2.7 ms.
    # Previously 32 (~0.67 ms) — needlessly low without a pro-audio workload and
    # prone to xruns/CPU load; 128 is responsive enough for desktop/games.
    default.clock.min-quantum   = 128
    default.clock.max-quantum   = 2048
    resample.quality            = 10
}

