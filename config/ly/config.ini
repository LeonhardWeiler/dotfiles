# ly configuration — only the keys that deliberately differ from the ly defaults.
# All options not listed use ly's defaults (ly also runs entirely without a
# config, missing keys fall back to the defaults). Compared against
# /etc/ly/config.ini (package default); the full, commented reference still lives
# in /etc/ly/config.ini.example.
#
# Note: shutdown_cmd/start_cmd differ because the ly default changed across a
# version bump — here the previously used behaviour is deliberately kept
# (behavior-preserving).

# Security: no empty passwords, no lockout counter, clear the password
# immediately after a failed login.
allow_empty_password = false
auth_fails = 0
clear_password = true

# Looks: big clock (en), hide keyboard locks/key hints/version string.
bigclock = en
hide_keyboard_locks = true
hide_key_hints = true
hide_version_string = true

# Enable numlock at start.
numlock = true

# Put the session log (stdout/stderr of the Wayland session) into the XDG state
# directory. Without this key ly writes its compiled-in default straight to
# `~/ly-session.log` in the home — cluttering the home folder. `.local/state/...`
# is relative to the home of the logging-in user (= ~/.local/state/ly-session.log).
session_log = .local/state/ly-session.log

# Power commands (pinned to the previous behaviour).
shutdown_cmd = /sbin/poweroff
start_cmd = null
