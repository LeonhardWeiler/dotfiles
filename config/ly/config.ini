# ly-Konfiguration — nur die bewusst von den ly-Defaults abweichenden Keys.
# Alle nicht aufgefuehrten Optionen nutzen die ly-Standardwerte (ly laeuft auch
# voellig ohne Config, fehlende Keys fallen auf Defaults zurueck). Abgeglichen
# gegen /etc/ly/config.ini (Paket-Default); die vollstaendige, kommentierte
# Referenz liegt weiterhin unter /etc/ly/config.ini.example.
#
# Hinweis: shutdown_cmd/start_cmd weichen ab, weil sich der ly-Default ueber
# einen Versionssprung geaendert hat — hier wird das bisher genutzte Verhalten
# bewusst festgehalten (behavior-preserving).

# Sicherheit: keine leeren Passwoerter, kein Lockout-Zaehler, Passwort nach
# fehlerhaftem Login sofort leeren.
allow_empty_password = false
auth_fails = 0
clear_password = true

# Optik: grosse Uhr (en), Tastatur-Locks/Key-Hints/Versionsstring ausblenden.
bigclock = en
hide_keyboard_locks = true
hide_key_hints = true
hide_version_string = true

# Numlock beim Start aktivieren.
numlock = true

# Session-Log (stdout/stderr der Wayland-Session) in das XDG-State-Verzeichnis
# legen. Ohne diesen Key schreibt ly seinen Compiled-in-Default direkt als
# `~/ly-session.log` ins Home — das zumuellt den Home-Ordner. `.local/state/...`
# ist relativ zum Home des einloggenden Users (= ~/.local/state/ly-session.log).
session_log = .local/state/ly-session.log

# Power-Kommandos (an bisheriges Verhalten gepinnt).
shutdown_cmd = /sbin/poweroff
start_cmd = null
