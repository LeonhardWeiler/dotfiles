# Navigation mirrors vim and dwl: h/l = horizontal (seek), j/k = vertical
# (volume). See AGENT/keymaps/design.md.
h  seek -5
l  seek  5
H  seek -1
L  seek  1
j  add volume -5
k  add volume  5

# The mpv defaults these displace, moved one modifier out of the way.
Ctrl+j  cycle sub
Ctrl+J  cycle sub down
Ctrl+l  ab-loop
Ctrl+L  cycle-values loop-file "inf" "no"

WHEEL_UP    add volume 5
WHEEL_DOWN  add volume -5
WHEEL_LEFT  seek 5
WHEEL_RIGHT seek +5

LEFT       seek -5
RIGHT      seek 5
SHIFT+LEFT  seek -1
SHIFT+RIGHT seek +1
UP    add volume 5
DOWN  add volume -5
