# wob configuration - ephemeral volume/brightness OSD (no notification daemon).
# A value is piped into a fresh wob per keypress (see ~/.local/bin/osd), wob
# draws the bar for a moment and then exits on stdin EOF. See wob.ini(5).
#
# Colors are RRGGBBAA. Palette matches the dwl borders (config/dwl/config.h):
# bar = focused border DDDDDD, border = unfocused 595959.

# timeout is only a safety upper bound here: osd keeps stdin open for ~0.8 s and
# wob quits on EOF, so the bar is visible for that long regardless. Keep this
# larger than osd's DURATION so the bar never hides early.
timeout = 1500
max = 100

# Geometry: a slim bar near the bottom-center of the focused output.
width = 300
height = 36
border_offset = 0
border_size = 2
bar_padding = 2
anchor = bottom
margin = 80

background_color = 000000c0
border_color = 595959ff
bar_color = ddddddff

# Volume can exceed 100% (pactl). nowrap clamps the bar to full and switches to
# the overflow colors (red border) to signal "above 100%".
overflow_mode = nowrap
overflow_bar_color = ddddddff
overflow_background_color = 000000c0
overflow_border_color = ff0000ff

# "muted" style (vol_ctl mute): dim grey bar instead of the bright default.
[style.muted]
background_color = 000000c0
border_color = 595959ff
bar_color = 595959ff
