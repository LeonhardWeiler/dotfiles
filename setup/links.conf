# Format (one mapping per line, two columns, whitespace-separated):
#
#     <source-in-repo>            <target-path>
#
# - <source-in-repo>: path relative to the repo root (e.g. config/nvim).
# - <target-path>:    where the symlink points. `~` = the user's home.
#                     Targets outside `~` (e.g. /etc/…) are created via sudo.
# - If the source ends in `/*`, the directory itself is NOT linked; instead every
#   entry inside it is linked individually into `<target>/<name>` (the target
#   directory stays real; foreign files in it are preserved). `*` does not match
#   hidden files
#
# Usage:  ./install [link|unlink|status]   (see ./install --help)

# ── Whole directories (dir symlink) ─────────────────────────────────────────
config/foot                 ~/.config/foot
config/nvim                 ~/.config/nvim
config/rofi                 ~/.config/rofi
config/wob                  ~/.config/wob
config/mpv                  ~/.config/mpv
config/git                  ~/.config/git
config/keepassxc            ~/.config/keepassxc

config/usrbin/*             ~/.local/bin
config/usrbin/update_programs_list  /usr/local/bin/update_programs_list

#config/wallpaper/pictures           ~/.local/share/wallpapers
#config/wallpaper/change-wallpaper.sh  ~/.local/bin/change-wallpaper

# ── Single files (parent directory stays real) ──────────────────────────────
config/bash/.bashrc         ~/.bashrc
config/bash/.bash_profile   ~/.bash_profile
config/btop/btop.conf       ~/.config/btop/btop.conf
config/qt5ct/qt5ct.conf     ~/.config/qt5ct/qt5ct.conf
config/mimeapps/mimeapps.list  ~/.config/mimeapps.list
config/pipewire/99-custom.conf ~/.config/pipewire/pipewire-pulse.conf.d/99-custom.conf
config/claude/skills        ~/.claude/skills
config/claude/settings.json ~/.claude/settings.json

# ── System targets in /etc (per file, via sudo) ─────────────────────────────
config/mkinitcpio/mkinitcpio.conf           /etc/mkinitcpio.conf
config/systemd-system/legion-conservation.service  /etc/systemd/system/legion-conservation.service
config/pacman/dotfiles-programs-list.hook   /etc/pacman.d/hooks/dotfiles-programs-list.hook
config/locale/locale.conf                   /etc/locale.conf
config/locale/locale.gen                    /etc/locale.gen
config/pacman/pacman.conf                   /etc/pacman.conf
config/logind/logind.conf                   /etc/systemd/logind.conf
