# links.conf - source -> target mapping for the symlink manager (./install).
#
# Format (one mapping per line, two columns, whitespace-separated):
#
#     <source-in-repo>            <target-path>
#
# - <source-in-repo>: path relative to the repo root (e.g. config/nvim).
# - <target-path>:    where the symlink points. `~` = the user's home.
#                     Targets outside `~` (e.g. /etc/…) are created via sudo.
# - Comments start with `#`, empty lines are ignored.
# - Whether a whole directory or a single file is linked follows purely from what
#   is written here (dir -> dir symlink, file -> file symlink).
# - If the source ends in `/*`, the directory itself is NOT linked; instead every
#   entry inside it is linked individually into `<target>/<name>` (the target
#   directory stays real; foreign files in it are preserved). `*` does not match
#   hidden files (dotfiles).
#
# Usage:  ./install [link|unlink|status]   (see ./install --help)

# ── Whole directories (dir symlink) ─────────────────────────────────────────
config/foot                 ~/.config/foot
config/nvim                 ~/.config/nvim
config/rofi                 ~/.config/rofi
config/wob                  ~/.config/wob
config/mpv                  ~/.config/mpv
config/git                  ~/.config/git
config/keepassxc            ~/.config/keepassxc

# `~/.local/bin` stays a real directory (it also holds foreign entries like
# `claude`); so link each file from config/usrbin individually:
config/usrbin/*             ~/.local/bin

# Additionally to a FIXED, user-independent system path: the pacman hook
# (/etc/pacman.d/hooks) cannot use `$HOME` variables - it calls this script via
# /usr/local/bin so the hook works for a foreign user too.
config/usrbin/update_programs_list  /usr/local/bin/update_programs_list

# Wallpapers: the picture set as a dir symlink into the XDG data dir, and the
# picker script into ~/.local/bin (on the PATH via .bashrc). The script defaults
# to ~/.local/share/wallpapers, so both targets line up.
#
# DISABLED: wallpaper/wbg is currently stood down (nothing linked, installed or
# started). To bring it back, uncomment the two lines below, re-enable the
# change-wallpaper autostart line in config/dwl/config.h (then `./install --dwl`),
# and run `./install --wbg` to build+install wbg. The files stay in the repo.
#config/wallpaper/pictures           ~/.local/share/wallpapers
#config/wallpaper/change-wallpaper.sh  ~/.local/bin/change-wallpaper

# ── Single files (parent directory stays real) ──────────────────────────────
config/bash/.bashrc         ~/.bashrc
config/bash/.bash_profile   ~/.bash_profile
config/btop/btop.conf       ~/.config/btop/btop.conf
config/qt5ct/qt5ct.conf     ~/.config/qt5ct/qt5ct.conf
config/mimeapps/mimeapps.list  ~/.config/mimeapps.list
config/pipewire/99-custom.conf ~/.config/pipewire/pipewire-pulse.conf.d/99-custom.conf
config/claude/skills        ~/.claude/skills
config/claude/settings.json ~/.claude/settings.json
config/hyprlock/hyprlock.conf  ~/.config/hypr/hyprlock.conf

# dwl (Wayland compositor, compiled config). The binary is built + installed by
# build-dwl (`./install --dwl`); only the session glue is symlinked here. The
# session .desktop goes to /usr/local/share/wayland-sessions (ly reads it via the
# extra `waylandsessions` path set in config/ly/config.ini); the env wrapper goes
# to /usr/local/bin so ly's default PATH resolves `dwl-run`. Startup programs are
# spawned by dwl itself (autostart[] in config.h, via patches/autostart.patch).
config/dwl/dwl.desktop      /usr/local/share/wayland-sessions/dwl.desktop
config/dwl/dwl-run          /usr/local/bin/dwl-run

# ── System targets in /etc (per file, via sudo) ─────────────────────────────
config/ly/config.ini                        /etc/ly/config.ini
config/mkinitcpio/mkinitcpio.conf           /etc/mkinitcpio.conf
config/mkinitcpio/devname                    /etc/initcpio/install/devname
config/systemd-system/legion-conservation.service  /etc/systemd/system/legion-conservation.service
config/pacman/dotfiles-programs-list.hook   /etc/pacman.d/hooks/dotfiles-programs-list.hook
config/vconsole/vconsole.conf               /etc/vconsole.conf
config/locale/locale.conf                   /etc/locale.conf
config/locale/locale.gen                    /etc/locale.gen
config/pacman/pacman.conf                   /etc/pacman.conf
config/logind/logind.conf                   /etc/systemd/logind.conf
