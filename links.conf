# links.conf — Zuordnung Quelle → Ziel für den Symlink-Manager (./install).
#
# Format (eine Zuordnung pro Zeile, zwei Spalten, per Leerraum getrennt):
#
#     <quelle-im-repo>            <ziel-pfad>
#
# - <quelle-im-repo>: Pfad relativ zum Repo-Root (z. B. config/nvim).
# - <ziel-pfad>:      wohin der Symlink zeigt. `~` = Home des Nutzers.
#                     Ziele außerhalb von `~` (z. B. /etc/…) werden per sudo
#                     angelegt.
# - Kommentare beginnen mit `#`, Leerzeilen werden ignoriert.
# - Ob ein ganzes Verzeichnis oder eine einzelne Datei verlinkt wird, ergibt
#   sich allein daraus, was hier steht (Ordner → Dir-Symlink, Datei → Datei-Symlink).
# - Endet die Quelle auf `/*`, wird NICHT der Ordner selbst verlinkt, sondern
#   jeder Eintrag darin einzeln nach `<ziel>/<name>` (das Ziel-Verzeichnis bleibt
#   real; fremde Dateien darin bleiben erhalten). `*` erfasst keine versteckten
#   Dateien (Punkt-Dateien).
#
# Verwendung:  ./install [link|unlink|status]   (siehe ./install --help)

# ── Ganze Verzeichnisse (Dir-Symlink) ───────────────────────────────────────
config/alacritty            ~/.config/alacritty
config/hypr                 ~/.config/hypr
config/nvim                 ~/.config/nvim
config/rofi                 ~/.config/rofi
config/mako                 ~/.config/mako
config/mpv                  ~/.config/mpv
config/git                  ~/.config/git
config/typst                ~/.config/typst
config/keepassxc            ~/.config/keepassxc

# `~/.local/bin` bleibt ein echtes Verzeichnis (enthält auch Fremd-Einträge wie
# `claude`); daher jede Datei aus config/usrbin einzeln verlinken:
config/usrbin/*             ~/.local/bin

# ── Einzelne Dateien (Eltern-Verzeichnis bleibt real) ────────────────────────
config/bash/.bashrc         ~/.bashrc
config/bash/.bash_profile   ~/.bash_profile
config/btop/btop.conf       ~/.config/btop/btop.conf
config/qt5ct/qt5ct.conf     ~/.config/qt5ct/qt5ct.conf
config/mimeapps/mimeapps.list  ~/.config/mimeapps.list
config/pipewire/99-custom.conf ~/.config/pipewire/pipewire-pulse.conf.d/99-custom.conf
config/claude/skills        ~/.claude/skills
config/claude/settings.json ~/.claude/settings.json

# ── systemd User-Units ───────────────────────────────────────────────────────
config/systemd-user/battery-check.service   ~/.config/systemd/user/battery-check.service
config/systemd-user/battery-check.timer     ~/.config/systemd/user/battery-check.timer
config/systemd-user/dotfiles-sync.service   ~/.config/systemd/user/dotfiles-sync.service

# ── System-Ziele in /etc (dateiweise, per sudo) ──────────────────────────────
config/ly/config.ini                        /etc/ly/config.ini
config/mkinitcpio/mkinitcpio.conf           /etc/mkinitcpio.conf
config/systemd-system/legion-conservation.service  /etc/systemd/system/legion-conservation.service
config/pacman/dotfiles-programs-list.hook   /etc/pacman.d/hooks/dotfiles-programs-list.hook
